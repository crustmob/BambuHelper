; BambuHelper - Bambu Lab Printer Monitor
; Supports ESP32-2432S028R (Cheap Yellow Display - CYD)
; Also supports ESP32-S3 Super Mini and ESP32-C3 Super Mini

; --- Shared library dependencies ---
[common]
lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    bodmer/TFT_eWidget@^0.0.6
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7.0
    PaulStoffregen/XPT2046_Touchscreen@^1.4

; --- Shared TFT_eSPI + font flags ---
common_flags =
    -D USER_SETUP_LOADED=1
    -D ILI9341_DRIVER=1
    -D TFT_WIDTH=240
    -D TFT_HEIGHT=320
    -D DISABLE_ALL_LIBRARY_WARNINGS=1
    -D LOAD_GLCD=1
    -D LOAD_FONT2=1
    -D LOAD_FONT4=1
    -D LOAD_FONT6=1
    -D LOAD_FONT7=1
    -D LOAD_GFXFF=1
    -D SMOOTH_FONT=1

; =============================================================================
;  ESP32-2432S028R (Cheap Yellow Display - CYD)
; =============================================================================
[env:cyd]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
board_build.partitions = default.csv
lib_deps = ${common.lib_deps}
build_flags =
    ${common.common_flags}
    -D SPI_FREQUENCY=27000000
    -D SPI_READ_FREQUENCY=20000000
    -D TFT_MISO=12
    -D TFT_MOSI=13
    -D TFT_SCLK=14
    -D TFT_CS=15
    -D TFT_DC=2
    -D TFT_RST=-1
    -D TFT_BL=21
    -D TOUCH_CS=33
    -D TOUCH_CLK=25
    -D TOUCH_DO=39
    -D TOUCH_DI=32
    -D TOUCH_IRQ=36

; =============================================================================
;  ESP32-S3 Super Mini
; =============================================================================
[env:esp32s3]
platform = espressif32
board = lolin_s3_mini
framework = arduino
monitor_speed = 115200
board_build.partitions = default.csv
board_build.arduino.memory_type = qio_qspi
lib_deps = ${common.lib_deps}
build_flags =
    -D USER_SETUP_LOADED=1
    -D ST7789_DRIVER=1
    -D TFT_WIDTH=240
    -D TFT_HEIGHT=240
    -D DISABLE_ALL_LIBRARY_WARNINGS=1
    -D LOAD_GLCD=1
    -D LOAD_FONT2=1
    -D LOAD_FONT4=1
    -D LOAD_FONT6=1
    -D LOAD_FONT7=1
    -D LOAD_GFXFF=1
    -D SMOOTH_FONT=1
    -D SPI_FREQUENCY=40000000
    ; --- USB Serial (S3 native USB CDC) ---
    -D ARDUINO_USB_CDC_ON_BOOT=1
    ; --- SPI pins (S3 Super Mini) ---
    -D TFT_MOSI=11  ;SDA
    -D TFT_SCLK=12  ;SCL
    -D TFT_CS=10
    -D TFT_DC=9
    -D TFT_RST=8
    -D TFT_BL=13
    -D USE_FSPI_PORT=1
